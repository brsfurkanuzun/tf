<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" fill="none">
  <defs>
    <linearGradient id="petal1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f8d0d8"/>
      <stop offset="50%" stop-color="#e8a0b0"/>
      <stop offset="100%" stop-color="#d48098"/>
    </linearGradient>
    <linearGradient id="petal2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fce0e8"/>
      <stop offset="100%" stop-color="#e890a8"/>
    </linearGradient>
    <linearGradient id="stem" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#6a9a68"/>
      <stop offset="100%" stop-color="#4a7a48"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M300 880 Q295 650 300 480 Q305 350 300 280" stroke="url(#stem)" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M300 520 Q220 480 180 420" stroke="url(#stem)" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <ellipse cx="178" cy="418" rx="28" ry="12" fill="#5a8a58" opacity="0.7" transform="rotate(-30 178 418)"/>
  <!-- Petals back -->
  <ellipse cx="300" cy="200" rx="55" ry="90" fill="url(#petal1)" opacity="0.7" transform="rotate(-15 300 200)"/>
  <ellipse cx="300" cy="200" rx="55" ry="90" fill="url(#petal1)" opacity="0.7" transform="rotate(15 300 200)"/>
  <ellipse cx="300" cy="200" rx="55" ry="90" fill="url(#petal1)" opacity="0.65" transform="rotate(165 300 200)"/>
  <ellipse cx="300" cy="200" rx="55" ry="90" fill="url(#petal1)" opacity="0.65" transform="rotate(-165 300 200)"/>
  <!-- Petals front -->
  <g filter="url(#glow)">
    <ellipse cx="300" cy="175" rx="50" ry="85" fill="url(#petal2)" transform="rotate(-8 300 175)"/>
    <ellipse cx="300" cy="175" rx="50" ry="85" fill="url(#petal2)" transform="rotate(8 300 175)"/>
    <ellipse cx="300" cy="160" rx="42" ry="70" fill="#f8c0d0" opacity="0.9"/>
    <!-- Inner highlight -->
    <ellipse cx="300" cy="195" rx="18" ry="30" fill="#fff0f4" opacity="0.5"/>
  </g>
</svg>
